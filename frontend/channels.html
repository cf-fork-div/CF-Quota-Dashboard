<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通知渠道 — CF Quota Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="page-shell">
  <header class="glass-nav">
    <div class="glass-nav__inner glass-nav__inner--wide">
      <div class="glass-nav__brand">
        <h1>通知渠道管理</h1>
        <p>配置告警推送目标 · <span id="enabled-count">0</span> 个已启用</p>
      </div>
      <nav class="glass-nav__links">
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/admin" class="nav-link">账号管理</a>
        <a href="/channels" class="nav-link nav-link--active">通知渠道</a>
        <span id="nav-auth" class="nav-auth"></span>
      </nav>
    </div>
  </header>

  <main class="page-main page-main--wide">
    <div class="channels-layout">
      <aside>
        <section class="glass-card">
          <h2 class="section-title section-title--sm">添加渠道</h2>
          <div class="type-grid" id="type-buttons">
            <button data-type="wecom" class="type-btn">企业微信</button>
            <button data-type="feishu" class="type-btn">飞书</button>
            <button data-type="dingtalk" class="type-btn">钉钉</button>
            <button data-type="webhook" class="type-btn">Webhook</button>
            <button data-type="telegram" class="type-btn">Telegram</button>
            <button data-type="email" class="type-btn">Email</button>
          </div>
        </section>

        <section id="channel-form-section" class="hidden mt-4 glass-card">
          <h2 id="form-title" class="section-title section-title--sm">新建渠道</h2>
          <form id="channel-form" class="space-y-3">
            <input type="hidden" name="id" />
            <input type="hidden" name="type" />
            <div class="form-group">
              <label class="form-label form-label--sm">名称</label>
              <input name="name" required class="glass-input" placeholder="主告警群" />
            </div>
            <div id="config-fields" class="space-y-3"></div>
            <label class="form-checkbox">
              <input type="checkbox" name="enabled" id="enabled-check" checked />
              <span>启用</span>
            </label>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">保存</button>
              <button type="button" id="cancel-form" class="btn btn-ghost">取消</button>
            </div>
            <p id="form-message" class="form-message"></p>
          </form>
        </section>
      </aside>

      <section>
        <h2 class="section-title">已配置渠道</h2>
        <div id="channels-list" class="channels-list loading-state">Loading…</div>
      </section>
    </div>
  </main>

  <script type="module" src="/channels.js"></script>
</body>
</html>
