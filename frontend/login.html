<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员登录 — CF 配额仪表盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="login-page">
  <div class="login-modal-overlay" role="presentation">
    <div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
      <header class="login-modal__header">
        <div class="login-modal__header-main">
          <span class="login-modal__header-icon" aria-hidden="true">
            <i class="fas fa-lock"></i>
          </span>
          <h1 id="login-modal-title" class="login-modal__title">管理员登录</h1>
        </div>
        <a href="/" class="login-modal__close" aria-label="关闭">&times;</a>
      </header>

      <form id="login-form" class="login-modal__form">
        <div class="form-group">
          <label class="form-label" for="login-password">管理员登录码</label>
          <input
            id="login-password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
            class="glass-input"
            placeholder="请输入管理员登录码"
          />
        </div>
        <button type="submit" class="btn btn-primary btn-block login-modal__submit">登录</button>
        <p id="login-message" class="form-message login-modal__message"></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { checkAuth, login } from '/auth.js';

    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '/admin';

    checkAuth().then((me) => {
      if (me.authenticated) {
        window.location.href = next;
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const msg = document.getElementById('login-message');
      msg.textContent = '';
      msg.className = 'form-message login-modal__message';
      try {
        await login(form.password.value);
        window.location.href = next;
      } catch (err) {
        msg.textContent = err.message === 'Invalid credentials' ? '登录码不正确' : (err.message || '登录失败');
        msg.className = 'form-message form-message--error login-modal__message';
      }
    });
  </script>
</body>
</html>
